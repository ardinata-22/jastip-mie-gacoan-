<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jastip Gacoan - Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100"><div class="bg-white p-4 shadow flex justify-between">
  <h1 class="font-bold">🍜 Jastip Gacoan</h1>
  <div>🛒 <span id="count">0</span></div>
</div><div class="p-4 space-y-3"><h2 class="font-bold">Mie</h2><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Mie Gacoan - Rp13.000</p>
<button onclick="openLevel('Mie Gacoan',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Mie Hompimpa - Rp13.000</p>
<button onclick="openLevel('Mie Hompimpa',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Mie Suit - Rp13.000</p>
<button onclick="openLevel('Mie Suit',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><h2 class="font-bold mt-4">Dimsum</h2><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Udang Rambutan - Rp13.000</p>
<button onclick="addItemDirect('Udang Rambutan',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Lumpia Udang - Rp13.000</p>
<button onclick="addItemDirect('Lumpia Udang',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Udang Keju - Rp13.000</p>
<button onclick="addItemDirect('Udang Keju',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Dimsum - Rp13.000</p>
<button onclick="addItemDirect('Dimsum',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div><div class="bg-white p-3 rounded shadow flex justify-between">
<p>Pangsit Goreng - Rp13.000</p>
<button onclick="addItemDirect('Pangsit Goreng',13000)" class="bg-red-500 text-white px-2 rounded">+</button>
</div></div><!-- Modal Level --><div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
<div class="bg-white p-4 rounded">
<p>Pilih Level</p>
<button onclick="addItem(0)">0</button>
<button onclick="addItem(1)">1</button>
<button onclick="addItem(2)">2</button>
<button onclick="addItem(3)">3</button>
<button onclick="addItem(4)">4</button>
<button onclick="addItem(6,1500)">6 +1500</button>
<button onclick="addItem(8,1500)">8 +1500</button>
</div>
</div><div class="fixed bottom-0 left-0 right-0 bg-white p-4">
<div id="cart"></div>
<p>Total: Rp <span id="total">0</span></p>
<button onclick="checkout()" class="bg-green-500 text-white w-full">Pesan Sekarang</button>
</div><script>
let total=0;
let items=[];
let currentName='';
let basePrice=0;

function openLevel(n,h){
currentName=n;
basePrice=h;
document.getElementById('modal').classList.remove('hidden');
}

function addItem(level,extra=0){
let price=basePrice+extra;
let text=currentName+' lvl '+level;
items.push(text);
total+=price;
render();
document.getElementById('modal').classList.add('hidden');
}

function addItemDirect(n,h){
items.push(n);
total+=h;
render();
}

function render(){
let html='';
items.forEach((i,x)=>html+=(x+1)+'. '+i+'<br>');
document.getElementById('cart').innerHTML=html;
document.getElementById('total').innerText=total;
document.getElementById('count').innerText=items.length;
}

function checkout(){
if(items.length==0){alert('Pilih dulu!');return;}
let text='Pesanan:%0A';
items.forEach((i,x)=>text+=(x+1)+'. '+i+'%0A');
text+='%0ATotal: '+total;
window.open('https://wa.me/6285746959923?text='+OrderJastip);
}
</script></body>
</html>
